apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/tasostasos/my-app.git
    targetRevision: main
    path: .
    # OR if using Helm:
    # chart: my-app
    # helm:
    #   valueFiles:
    #   - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: kubedev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
